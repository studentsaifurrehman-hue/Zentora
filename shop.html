<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop Zentora's premium collection — fashion, beauty, tech, home & accessories. Filter by category and price. Free shipping over $150." />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Shop — Zentora Luxury Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <head>
    <head>
      <link rel="stylesheet" href="css/styles.css" />
      <link rel="icon" type="image/png" href="favicon.png.png">
  </head>
</head>
</head>
<body data-page="shop">

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
  <img src="favicon.png.png" alt="Zentora Logo" style="width: 30px; height: 30px; border-radius: 50%; object-fit: contain;">
</a>
      <nav class="nav-menu" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="index.html#categories">Categories</a>
        <a href="index.html#deals">Deals</a>
        <a href="index.html#testimonials">Reviews</a>
      </nav>
      <div class="header-actions">
        <button class="icon-btn wishlist-toggle" aria-label="Wishlist">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="count wishlist-count">0</span>
        </button>
        <button class="icon-btn cart-toggle" aria-label="Shopping cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="count cart-count">0</span>
        </button>
        <button class="nav-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="page-hero">
    <div class="container">
      <span class="section-label">The Collection</span>
      <h1>Shop All Products</h1>
      <p>Discover our full range of premium fashion, beauty, tech & lifestyle essentials.</p>
    </div>
  </div>

  <div class="container shop-layout">
    <aside class="shop-filters">
      <h3>Filters</h3>

      <div class="filter-group">
        <label for="filter-search">Search</label>
        <input type="search" id="filter-search" placeholder="Search products..." />
      </div>

      <div class="filter-group">
        <label for="filter-category">Category</label>
        <select id="filter-category">
          <option value="all">All Categories</option>
          <option value="fashion">Fashion</option>
          <option value="beauty">Beauty</option>
          <option value="tech">Tech</option>
          <option value="home">Home</option>
          <option value="accessories">Accessories</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Price Range ($)</label>
        <div class="price-range">
          <input type="number" id="filter-min" placeholder="Min" min="0" />
          <input type="number" id="filter-max" placeholder="Max" min="0" />
        </div>
      </div>

      <div class="filter-group">
        <label for="filter-sort">Sort By</label>
        <select id="filter-sort">
          <option value="featured">Featured</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="rating">Highest Rated</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>

      <div class="trust-badges" style="margin-top: var(--space-md);">
        <div class="trust-badge"><span class="trust-icon">🔒</span> Secure Checkout</div>
        <div class="trust-badge"><span class="trust-icon">↩</span> 30-Day Returns</div>
      </div>
    </aside>

    <main>
      <div class="category-pills">
        <button class="category-pill active" data-category="all">All</button>
        <button class="category-pill" data-category="fashion">Fashion</button>
        <button class="category-pill" data-category="beauty">Beauty</button>
        <button class="category-pill" data-category="tech">Tech</button>
        <button class="category-pill" data-category="home">Home</button>
        <button class="category-pill" data-category="accessories">Accessories</button>
      </div>

      <div class="shop-toolbar">
        <span id="result-count">12 products</span>
      </div>

      <div class="product-grid" id="shop-grid"></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border: none; padding-top: 0;">
        <span>&copy; 2026 Zentora. All rights reserved.</span>
        <div class="payment-icons">
          <span>VISA</span>
          <span>MC</span>
          <span>AMEX</span>
          <span>PayPal</span>
        </div>
      </div>
    </div>
  </footer>

  <div class="cart-overlay" role="dialog" aria-label="Shopping cart">
    <div class="cart-panel">
      <div class="panel-header">
        <h3>Your Cart</h3>
        <button class="panel-close cart-close" aria-label="Close cart">&times;</button>
      </div>
      <div class="cart-content"></div>
    </div>
  </div>

  <div class="wishlist-overlay" role="dialog" aria-label="Wishlist">
    <div class="wishlist-panel">
      <div class="panel-header">
        <h3>Wishlist</h3>
        <button class="panel-close wishlist-close" aria-label="Close wishlist">&times;</button>
      </div>
      <div class="wishlist-content"></div>
    </div>
  </div>

  <a href="https://wa.me/923352754141?text=Hi%20Zentora%2C%20I%20need%20help%20with%20my%20order" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
    <span class="whatsapp-tooltip">Chat with us</span>

  </a>

  <script type="module" src="js/app.js"></script>
</body>
</html>
