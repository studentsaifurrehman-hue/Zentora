<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop Zentora's premium collection — fashion, beauty, tech, home & accessories." />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Shop — Zentora Luxury Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" href="favicon.png.png">
  <style>
    /* Admin Panel Styling */
    .admin-section {
      display: none; 
      background: #fdfdfd;
      border: 2px dashed #111;
      padding: 20px;
      margin-bottom: 30px;
      border-radius: 8px;
    }
    .admin-form-group {
      margin-bottom: 12px;
    }
    .admin-form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 0.85rem;
    }
    .admin-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .admin-btn {
      background: #21ba45;
      color: white;
      padding: 12px 20px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      text-transform: uppercase;
    }
    /* Invisible Button - Screen ke bottom-left kone me access point */
    .secret-trigger {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 30px;
      height: 30px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 9999;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body data-page="shop">

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img src="favicon.png.png" alt="Zentora Logo" style="width: 30px; height: 30px; border-radius: 50%; object-fit: contain;">
      </a>
      <nav class="nav-menu" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="index.html#categories">Categories</a>
        <a href="index.html#deals">Deals</a>
        <a href="index.html#testimonials">Reviews</a>
      </nav>
      <div class="header-actions">
        <button class="icon-btn wishlist-toggle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="count wishlist-count">0</span>
        </button>
        <button class="icon-btn cart-toggle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="count cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <div class="page-hero">
    <div class="container">
      <span class="section-label">Global Collection</span>
      <h1>Shop All Products</h1>
    </div>
  </div>

  <div class="container shop-layout">
    <aside class="shop-filters">
      
      <div class="admin-section" id="admin-panel">
        <h4 style="margin-top:0; color:#111;">📢 POST GLOBAL PRODUCT (ADMIN)</h4>
        <div class="admin-form-group">
          <label>Product Title:</label>
          <input type="text" id="new-p-name" class="admin-input" placeholder="e.g. Luxury Shirt">
        </div>
        <div class="admin-form-group">
          <label>Price (Rs):</label>
          <input type="number" id="new-p-price" class="admin-input" placeholder="e.g. 1999">
        </div>
        <div class="admin-form-group">
          <label>Category:</label>
          <select id="new-p-cat" class="admin-input">
            <option value="fashion">Fashion</option>
            <option value="beauty">Beauty</option>
            <option value="tech">Tech</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label>Image Link or Path:</label>
          <input type="text" id="new-p-img" class="admin-input" placeholder="images/product.jpg ya direct URL link">
        </div>
        <button class="admin-btn" onclick="uploadProductToFirebase()">🚀 Publish to Everyone</button>
      </div>

      <h3>Filters</h3>
      <div class="filter-group">
        <label for="filter-search">Search</label>
        <input type="search" id="filter-search" placeholder="Search products..." oninput="filterProductsLocalStorage()" />
      </div>
    </aside>

    <main>
      <div class="shop-toolbar">
        <span id="result-count">Connecting to database...</span>
      </div>
      <div class="product-grid" id="shop-grid"></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border: none; padding-top: 20px;">
        <span>&copy; 2026 Zentora. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <button class="secret-trigger" onclick="unlockAdminPanel()" aria-label="Admin Access"></button>

  <script>
    // ⚠️ APNE FIREBASE PROJECT KA REAL CONFIG DETAILS YAHAN PASTE KAREIN
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Arrays are completely empty (No old or dummy products)
    let BASE_PRODUCTS = [];
    let runtimeProductsList = [];

    // Password verification function
    function unlockAdminPanel() {
        const password = prompt("🔑 Enter Admin Password to Upload Products:");
        if (password === "zentora786") {
            document.getElementById('admin-panel').style.display = 'block';
            alert("🔓 Access Granted! Secret Admin Upload Panel is now open.");
        } else {
            alert("❌ Wrong Password! Access Denied.");
        }
    }

    // Cloud Firebase real-time dataset inject logic
    function uploadProductToFirebase() {
        const name = document.getElementById('new-p-name').value.trim();
        const price = parseInt(document.getElementById('new-p-price').value);
        const category = document.getElementById('new-p-cat').value;
        const image = document.getElementById('new-p-img').value.trim() || "images/default.jpg";

        if(!name || !price) {
            alert("⚠️ Title aur Price enter karna zaroori hai!");
            return;
        }

        const newProduct = {
            id: Date.now(),
            name: name,
            price: price,
            category: category,
            image: image
        };

        database.ref('products/').push(newProduct)
        .then(() => {
            alert("🎉 Product uploaded successfully! Ab yeh sab ko globally dikhega.");
            document.getElementById('new-p-name').value = "";
            document.getElementById('new-p-price').value = "";
            document.getElementById('new-p-img').value = "";
        })
        .catch((err) => {
            alert("Upload failed: " + err.message);
        });
    }

    // Real-time Cloud Sync Event Listener
    database.ref('products/').on('value', (snapshot) => {
        let firebaseProducts = [];
        snapshot.forEach((childSnapshot) => {
            firebaseProducts.push(childSnapshot.val());
        });
        runtimeProductsList = [...BASE_PRODUCTS, ...firebaseProducts];
        renderGrid(runtimeProductsList);
    });

    function renderGrid(products) {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = "";
        
        if(products.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px; font-weight: 500;">No products found. Open secret admin panel to post real items!</div>`;
            document.getElementById('result-count').innerText = `0 products listed`;
            return;
        }

        products.forEach(product => {
            grid.innerHTML += `
                <div class="product-card" style="border: 1px solid #eee; padding: 15px; border-radius: 8px; background:#fff;">
                    <img src="${product.image}" alt="${product.name}" style="width:100%; height:200px; object-fit:cover; border-radius:4px; margin-bottom:10px;" onerror="this.src='images/default.jpg';">
                    <span style="font-size:0.75rem; text-transform:uppercase; color:#888; font-weight:bold;">${product.category}</span>
                    <h4 style="margin: 5px 0; font-size:1rem; color:#111;">${product.name}</h4>
                    <p style="font-weight:bold; color:#000; margin: 5px 0 15px 0;">Rs ${product.price}</p>
                    <button onclick="addToCart(${product.price})" style="width:100%; padding:10px; background:#111; color:#fff; border:none; font-weight:bold; cursor:pointer; border-radius:4px;">ADD TO CART</button>
                </div>
            `;
        });
        document.getElementById('result-count').innerText = `${products.length} products listed globally`;
    }

    function filterProductsLocalStorage() {
        const query = document.getElementById('filter-search').value.toLowerCase();
        const filtered = runtimeProductsList.filter(p => p.name.toLowerCase().includes(query));
        renderGrid(filtered);
    }

    function addToCart(price) {
        let currentTotal = parseInt(localStorage.getItem('cartTotal')) || 0;
        currentTotal += price;
        localStorage.setItem('cartTotal', currentTotal);
        alert("🛒 Product added to cart successfully!");
    }
  </script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
